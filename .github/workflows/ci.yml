name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Backend Tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        env:
          # Tests use in-memory SQLite — no real Postgres needed in CI
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          ANTHROPIC_API_KEY: "sk-ant-ci-placeholder-not-real"
          SECRET_KEY: "ci-test-secret-key-32-chars-xxxx"
        run: |
          pytest tests/ -v \
            --tb=short \
            --asyncio-mode=auto \
            -p no:warnings

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - name: Lint backend
        working-directory: backend
        run: ruff check app/ tests/ --select E,F,W,I --ignore E501
