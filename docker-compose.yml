#version: "3.11"

services:
  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-securedeviq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securedeviq_secret}
      POSTGRES_DB: ${POSTGRES_DB:-securedeviq}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-securedeviq}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-securedeviq}:${POSTGRES_PASSWORD:-securedeviq_secret}@db:5432/${POSTGRES_DB:-securedeviq}
      # AI provider selection — set AI_PROVIDER to "anthropic" or "qwen"
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      # Anthropic (used when AI_PROVIDER=anthropic)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      # Qwen / DashScope (used when AI_PROVIDER=qwen)
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      QWEN_MODEL: ${QWEN_MODEL:-qwen-plus}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      CORS_ORIGINS: "http://localhost:3000,http://frontend:3000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "
      until getent hosts db > /dev/null 2>&1; do
        echo 'Waiting for db DNS...';
        sleep 1;
      done;
      alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ── Reflex frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
      - "8001:8001"           # Reflex WebSocket port
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    command: reflex run --env dev --frontend-port 3000 --backend-host 0.0.0.0 --backend-port 8001

volumes:
  postgres_data:
