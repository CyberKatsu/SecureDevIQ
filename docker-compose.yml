#version: "3.11"

services:
  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env (openssl rand -hex 32)}
      # AI provider selection — set AI_PROVIDER to "anthropic" or "qwen"
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      # Anthropic (used when AI_PROVIDER=anthropic)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      # Qwen / DashScope (used when AI_PROVIDER=qwen)
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      QWEN_MODEL: ${QWEN_MODEL:-qwen-plus}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      # Openrouter (used when AI_PROVIDER=openrouter)
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4-turbo}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      CORS_ORIGINS: "http://localhost:${FRONTEND_PORT:-5173},http://frontend:3000"
    ports:
      - "${BACKEND_PORT:-7429}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app:cached
    command: >
      sh -c "
      until getent hosts db > /dev/null 2>&1; do
        echo 'Waiting for db DNS...';
        sleep 1;
      done;
      alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ── Reflex frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-5173}:3000"
      - "${FRONTEND_WEBSOCKET_PORT:-5174}:8001"           # Reflex WebSocket port
    depends_on:
      - backend
    volumes:
      - ./frontend:/app:cached
    command: reflex run --env dev --frontend-port 3000 --backend-host 0.0.0.0 --backend-port 8001

volumes:
  postgres_data:
